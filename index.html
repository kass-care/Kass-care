<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KassCare | Facilities</title>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--dark); padding: 12px 40px; color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: white; }

        /* Button Styling */
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #2563eb; transform: translateY(-1px); }

        /* Content Area */
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* The Table */
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; }
        td { padding: 16px; border-top: 1px solid #e2e8f0; font-size: 14px; }
        tr:hover { background-color: #f8fafc; }

        /* Status Badge */
        .badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 99px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="background: var(--primary); padding: 6px 12px; border-radius: 6px; font-weight: 900;">K</div>
            <span style="font-weight: 700; letter-spacing: 1px; font-size: 18px;">KASSCARE</span>
        </div>
        <nav class="nav-links">
            <a href="#">Facilities</a>
            <a href="#">Caregivers</a>
            <a href="#">Calendar</a>
        </nav>
    </header>

    <div class="container">
        <div class="header-row">
            <h1 style="font-size: 28px; font-weight: 800; margin: 0;">Facilities</h1>
            <button class="btn-add" onclick="addNewFacility()">+ Add Facility</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Address / Location</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="facility-list">
                    <tr>
                        <td><strong>Saba</strong></td>
                        <td>Kenya</td>
                        <td><span class="badge">Active</span></td>
                    </tr>
                    <tr>
                        <td><strong>Sunrice Faith Care</strong></td>
                        <td>West</td>
                        <td><span class="badge">Active</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function addNewFacility() {
            const name = prompt("Enter Facility Name:");
            const address = prompt("Enter Address:");
            
            if (name && address) {
                const list = document.getElementById('facility-list');
                const row = list.insertRow();
                row.innerHTML = `
                    <td><strong>${name}</strong></td>
                    <td>${address}</td>
                    <td><span class="badge">Active</span></td>
                `;
            }
        }
    </script>
</body>
</html>
